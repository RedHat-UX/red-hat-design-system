<meta itemprop="description" content="Session persistence using the storage-key attribute to save and restore open state and panel width across page navigations.">
<rh-drawer id="drawer" variant="overlay" storage-key="demo-storage">
  <div slot="header">Header</div>
  <div slot="body">Body</div>
  <div slot="footer">Footer</div>
  <div>
    <h3>Content</h3>
    <p>Collapse or resize the drawer, navigate away, then return. The drawer state will
      be restored from session storage.</p>

    <form id="knobs">
      <fieldset>
        <legend>Variant</legend>
        <label><input type="radio" name="variant" value="auto"> auto</label>
        <label><input type="radio" name="variant" value="overlay" checked> overlay</label>
      </fieldset>
      <fieldset>
        <legend>Position</legend>
        <label><input type="radio" name="position" value="inline-start" checked> inline-start</label>
        <label><input type="radio" name="position" value="inline-end"> inline-end</label>
      </fieldset>
      <fieldset id="panel-fieldset">
        <legend>Panel</legend>
        <label><input type="radio" name="panel" value="collapsible" checked> collapsible</label>
        <label><input type="radio" name="panel" value="resizable"> resizable</label>
        <label><input type="radio" name="panel" value="none"> none</label>
      </fieldset>
      <fieldset>
        <legend>Expand</legend>
        <label><input type="radio" name="expand" value="" checked> none</label>
        <label><input type="radio" name="expand" value="full-viewport"> full-viewport</label>
      </fieldset>
      <fieldset id="overlay-threshold-fieldset" disabled>
        <legend>Overlay Threshold</legend>
        <div class="help-text">Only applies to auto variant</div>
        <label><input type="radio" name="overlay-threshold" value="" checked> none (768px)</label>
        <label><input type="radio" name="overlay-threshold" value="md"> md (992px)</label>
        <label><input type="radio" name="overlay-threshold" value="lg"> lg (1200px)</label>
        <label><input type="radio" name="overlay-threshold" value="xl"> xl (1440px)</label>
        <label><input type="radio" name="overlay-threshold" value="2xl"> 2xl (1680px)</label>
      </fieldset>
    </form>
    <button id="trigger" disabled aria-controls="drawer" aria-expanded="true">Toggle Drawer</button>
    <div class="help-text">Enabled when panel is resizable or none</div>
  </div>
</rh-drawer>

<script type="module">
  import '@rhds/elements/rh-drawer/rh-drawer.js';

  const KNOBS_KEY = 'demo-storage-knobs';
  const trigger = document.getElementById('trigger');
  const form = document.getElementById('knobs');
  const drawer = document.getElementById('drawer');

  const collapsibleInput = form.querySelector('[name="panel"][value="collapsible"]');
  const resizableInput = form.querySelector('[name="panel"][value="resizable"]');
  const noneInput = form.querySelector('[name="panel"][value="none"]');

  drawer.addEventListener('open', () => trigger.setAttribute('aria-expanded', 'true'));
  drawer.addEventListener('close', () => trigger.setAttribute('aria-expanded', 'false'));

  function saveKnobs() {
    const data = Object.fromEntries(new FormData(form));
    sessionStorage.setItem(KNOBS_KEY, JSON.stringify(data));
  }

  function restoreKnobs() {
    try {
      const raw = sessionStorage.getItem(KNOBS_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      for (const [name, value] of Object.entries(data)) {
        const input = form.querySelector(`[name="${name}"][value="${value}"]`);
        if (input) {
          input.checked = true;
        }
      }
      applyKnobs();
    } catch {
      // ignore corrupt data
    }
  }

  function applyKnobs() {
    const data = Object.fromEntries(new FormData(form));
    const variant = data.variant;

    const canCollapse = variant !== 'fixed' && variant !== 'flow';
    const canResize = variant === 'fixed' || variant === 'overlay';

    collapsibleInput.disabled = !canCollapse;
    resizableInput.disabled = !canResize;

    if (data.panel === 'collapsible' && !canCollapse) {
      data.panel = canResize ? 'resizable' : 'none';
      (canResize ? resizableInput : noneInput).checked = true;
    } else if (data.panel === 'resizable' && !canResize) {
      data.panel = canCollapse ? 'collapsible' : 'none';
      (canCollapse ? collapsibleInput : noneInput).checked = true;
    }

    const needsTrigger = data.panel === 'resizable' || data.panel === 'none';

    drawer.variant = variant;
    drawer.position = data.position;
    drawer.panel = data.panel || undefined;
    drawer.expand = data.expand || undefined;
    drawer.overlayThreshold = data['overlay-threshold'] || undefined;
    drawer.triggerId = needsTrigger ? 'trigger' : undefined;
    trigger.disabled = !needsTrigger;

    document.getElementById('overlay-threshold-fieldset').disabled = variant !== 'auto';
  }

  form.addEventListener('input', function() {
    applyKnobs();
    saveKnobs();
  });

  await customElements.whenDefined('rh-drawer');
  await drawer.updateComplete;
  restoreKnobs();
</script>
