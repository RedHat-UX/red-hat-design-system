---
description: "Textarea with a character counter showing current length vs maximum, using show-character-count and maxlength."
---
<label for="textarea-count">
  Bio (max 200 characters)
</label>
<rh-textarea id="textarea-count"
             placeholder="Tell us about yourself"
             maxlength="200"
             show-character-count></rh-textarea>

<script type="module">
  import '@rhds/elements/rh-textarea/rh-textarea.js';
</script>

<style>
  label,
  rh-textarea {
    margin-inline: 20px;
    max-inline-size: 320px;
  }

  label {
    display: block;
    font-family: var(--rh-font-family-body-text);
    font-weight: var(--rh-font-weight-body-text-medium, 500);
    margin-block: var(--rh-space-md, 8px);
  }
</style>
